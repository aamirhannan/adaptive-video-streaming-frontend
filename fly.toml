# fly.toml app configuration file generated for adaptive-video-streaming-frontend on 2026-03-30T16:11:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'adaptive-video-streaming-frontend'
primary_region = 'ams'

[build]
  [build.args]
    VITE_API_BASE_URL = "https://adaptive-video-streaming-backend.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
